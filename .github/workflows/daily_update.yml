name: Daily arXiv Fetch

on:
  schedule:
    - cron: '0 8 * * *' # Runs every day at 8:00 AM UTC
  workflow_dispatch: # Allows you to run it manually from the GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to commit the new HTML file

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Run generation script
      run: python build.py

    - name: Commit and push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add index.html
        git commit -m "Automated daily arXiv update" || exit 0
        git push
